<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Otter head -->
  <circle cx="16" cy="18" r="13" fill="#14B8A6"/>

  <!-- Left ear -->
  <circle cx="9" cy="7" r="3.5" fill="#14B8A6"/>

  <!-- Right ear -->
  <circle cx="23" cy="7" r="3.5" fill="#14B8A6"/>

  <!-- Inner ear left -->
  <circle cx="9" cy="7" r="1.5" fill="white"/>

  <!-- Inner ear right -->
  <circle cx="23" cy="7" r="1.5" fill="white"/>

  <!-- Eyes left -->
  <circle cx="12" cy="16" r="1.8" fill="white"/>

  <!-- Eyes right -->
  <circle cx="20" cy="16" r="1.8" fill="white"/>

  <!-- Nose -->
  <ellipse cx="16" cy="20" rx="1.2" ry="1.5" fill="white"/>

  <!-- Mouth - subtle smile -->
  <path d="M 16 20 Q 13 22 12 21" stroke="white" stroke-width="1" fill="none" stroke-linecap="round"/>
  <path d="M 16 20 Q 19 22 20 21" stroke="white" stroke-width="1" fill="none" stroke-linecap="round"/>

  <!-- Left whiskers -->
  <line x1="7" y1="17" x2="3" y2="16.5" stroke="white" stroke-width="1" stroke-linecap="round"/>
  <line x1="7" y1="19" x2="2" y2="20" stroke="white" stroke-width="1" stroke-linecap="round"/>

  <!-- Right whiskers -->
  <line x1="25" y1="17" x2="29" y2="16.5" stroke="white" stroke-width="1" stroke-linecap="round"/>
  <line x1="25" y1="19" x2="30" y2="20" stroke="white" stroke-width="1" stroke-linecap="round"/>

  <!-- Cheek circles -->
  <circle cx="8" cy="19" r="1.5" fill="white" opacity="0.3"/>
  <circle cx="24" cy="19" r="1.5" fill="white" opacity="0.3"/>
</svg>