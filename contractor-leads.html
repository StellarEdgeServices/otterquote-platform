<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="/img/brand-assets/favicon.png">
    <title>Available Projects — Otter Quotes Contractor</title>

    <!-- GA4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-JNQ6XR3LX2"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-JNQ6XR3LX2');
    </script>

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400&display=swap" rel="stylesheet">

    <!-- Design System & Navigation -->
    <link rel="stylesheet" href="css/design-system.css">
    <link rel="stylesheet" href="css/nav.css">

    <!-- Page-Specific Styles -->
    <style>
        main {
            padding: var(--sp-8) var(--sp-4);
            max-width: 1400px;
            margin: 0 auto;
        }

        .page-header {
            margin-bottom: var(--sp-8);
        }

        .page-header h1 {
            font-family: var(--font-heading);
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--navy);
            margin-bottom: var(--sp-2);
            line-height: 1.1;
        }

        .page-header p {
            font-family: var(--font-body);
            font-size: 1.125rem;
            color: var(--slate);
            margin: 0;
        }

        .filter-section {
            background: var(--white);
            border: 1px solid #E5E7EB;
            border-radius: var(--radius-lg);
            padding: var(--sp-6);
            margin-bottom: var(--sp-8);
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: var(--sp-4);
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: var(--sp-2);
        }

        .filter-label {
            font-family: var(--font-body);
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--navy);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .filter-select {
            padding: var(--sp-3) var(--sp-4);
            border: 1px solid #D1D5DB;
            border-radius: var(--radius-md);
            font-family: var(--font-body);
            font-size: 0.95rem;
            color: var(--navy);
            background: var(--white);
            cursor: pointer;
            transition: border-color 0.2s ease;
        }

        .filter-select:hover,
        .filter-select:focus {
            border-color: var(--amber);
            outline: none;
        }

        .lead-card {
            background: var(--white);
            border: 1px solid #E5E7EB;
            border-radius: var(--radius-lg);
            padding: var(--sp-6);
            margin-bottom: var(--sp-6);
            transition: all 0.2s ease;
        }

        .lead-card:hover {
            border-color: var(--amber);
            box-shadow: 0 8px 24px rgba(20, 184, 166, 0.1);
        }

        .lead-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: var(--sp-4);
            gap: var(--sp-4);
        }

        .lead-id {
            font-family: var(--font-heading);
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--navy);
            margin: 0;
        }

        .lead-location {
            font-family: var(--font-body);
            font-size: 0.95rem;
            color: var(--slate);
            margin: 0;
        }

        .lead-main-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: var(--sp-4);
            margin-bottom: var(--sp-6);
            padding-bottom: var(--sp-6);
            border-bottom: 1px solid #E5E7EB;
        }

        .info-block {
            display: flex;
            flex-direction: column;
            gap: var(--sp-1);
        }

        .info-label {
            font-family: var(--font-body);
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--slate);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .info-value {
            font-family: var(--font-body);
            font-size: 1rem;
            font-weight: 500;
            color: var(--navy);
        }

        .badge-group {
            display: flex;
            flex-wrap: wrap;
            gap: var(--sp-3);
            margin-bottom: var(--sp-6);
        }

        .badge {
            display: inline-block;
            padding: var(--sp-2) var(--sp-4);
            background: #F3F4F6;
            color: var(--navy);
            border-radius: var(--radius-md);
            font-family: var(--font-body);
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .badge-available {
            background: #DCFCE7;
            color: #15803D;
        }

        .badge-pending {
            background: #FEF3C7;
            color: #92400E;
        }

        .fee-breakdown {
            background: #F9FAFB;
            border: 1px solid #E5E7EB;
            border-radius: var(--radius-md);
            padding: var(--sp-4);
            margin-bottom: var(--sp-6);
        }

        .fee-breakdown-title {
            font-family: var(--font-body);
            font-size: 0.875rem;
            font-weight: 700;
            color: var(--navy);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: var(--sp-3);
            display: block;
        }

        .fee-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--sp-2) 0;
            font-family: var(--font-body);
            font-size: 0.9rem;
            color: #374151;
        }

        .fee-item-label {
            font-weight: 500;
        }

        .fee-item-amount {
            color: var(--navy);
            font-weight: 600;
        }

        .fee-total {
            padding-top: var(--sp-3);
            border-top: 2px solid #D1D5DB;
            font-weight: 700;
            color: var(--navy);
        }

        .actions-row {
            display: flex;
            gap: var(--sp-4);
            justify-content: flex-end;
        }

        .btn {
            display: inline-block;
            padding: var(--sp-3) var(--sp-6);
            border: none;
            border-radius: var(--radius-md);
            font-family: var(--font-body);
            font-size: 0.95rem;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: var(--amber);
            color: var(--white);
        }

        .btn-primary:hover {
            background: #D97706;
        }

        .btn-secondary {
            background: #F3F4F6;
            color: var(--navy);
            border: 1px solid #D1D5DB;
        }

        .btn-secondary:hover {
            background: #E5E7EB;
        }

        .empty-state {
            text-align: center;
            padding: var(--sp-12);
            color: var(--slate);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: var(--sp-4);
            display: block;
        }

        .empty-state-title {
            font-family: var(--font-heading);
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--navy);
            margin-bottom: var(--sp-2);
        }

        .empty-state-text {
            font-family: var(--font-body);
            font-size: 1rem;
            color: var(--slate);
            margin-bottom: var(--sp-6);
        }

        .results-count {
            font-family: var(--font-body);
            font-size: 0.95rem;
            color: var(--slate);
            margin-bottom: var(--sp-6);
        }

        @media (max-width: 768px) {
            main {
                padding: var(--sp-4) var(--sp-3);
            }

            .page-header h1 {
                font-size: 1.75rem;
            }

            .filter-section {
                grid-template-columns: 1fr;
            }

            .lead-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .lead-main-info {
                grid-template-columns: 1fr;
            }

            .actions-row {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <header id="site-header" data-auth="false"></header>

    <main>
        <div class="page-header">
            <h1>Available Projects</h1>
            <p>Pre-qualified homeowner projects in your service area</p>
        </div>

        <!-- Filter Section -->
        <div class="filter-section">
            <div class="filter-group">
                <label class="filter-label">Damage Type</label>
                <select class="filter-select" id="damageTypeFilter">
                    <option value="">All Types</option>
                    <option value="roof">Roof</option>
                    <option value="siding">Siding</option>
                    <option value="gutters">Gutters</option>
                    <option value="windows">Windows</option>
                </select>
            </div>
            <div class="filter-group">
                <label class="filter-label">Material</label>
                <select class="filter-select" id="materialFilter">
                    <option value="">All Materials</option>
                    <option value="architectural">Architectural Shingle</option>
                    <option value="designer">Designer Shingle</option>
                    <option value="metal-seam">Metal Standing Seam</option>
                    <option value="metal-fastener">Metal Exposed Fastener</option>
                </select>
            </div>
            <div class="filter-group">
                <label class="filter-label">Distance</label>
                <select class="filter-select" id="distanceFilter">
                    <option value="">All Distances</option>
                    <option value="10">Within 10 mi</option>
                    <option value="25">Within 25 mi</option>
                    <option value="50">Within 50 mi</option>
                </select>
            </div>
            <div class="filter-group">
                <label class="filter-label">Sort By</label>
                <select class="filter-select" id="sortFilter">
                    <option value="newest">Newest First</option>
                    <option value="value-high">Highest Value</option>
                    <option value="closest">Closest Distance</option>
                </select>
            </div>
        </div>

        <div class="results-count" id="resultsCount">5 projects available</div>

        <!-- Leads Container -->
        <div id="leadsContainer">
            <!-- Populated by JavaScript -->
        </div>
    </main>

    <footer id="site-footer"></footer>

    <!-- Scripts -->
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/nav.js"></script>

    <script>
        // Demo data for contractor leads
        const demoLeads = [
            {
                id: 'CS-2026-0048',
                location: 'Indianapolis',
                zip: '46208',
                damageType: 'Roof',
                damageDetail: 'Hail & Wind',
                insuranceCarrier: 'State Farm',
                material: 'GAF Architectural — Class 4 Impact Resistant',
                estimatedValueMin: 18500,
                estimatedValueMax: 22000,
                estimateAvailable: true,
                measurementsAvailable: true,
                claimFiledDate: '2026-03-15',
                distance: 5
            },
            {
                id: 'CS-2026-0047',
                location: 'Brownsburg',
                zip: '46112',
                damageType: 'Roof',
                damageDetail: 'Wind',
                insuranceCarrier: 'Allstate',
                material: 'OC Duration',
                estimatedValueMin: 14000,
                estimatedValueMax: 17000,
                estimateAvailable: true,
                measurementsAvailable: false,
                claimFiledDate: '2026-03-14',
                distance: 12
            },
            {
                id: 'CS-2026-0046',
                location: 'Carmel',
                zip: '46032',
                damageType: 'Roof',
                damageDetail: 'Hail',
                insuranceCarrier: 'Erie Insurance',
                material: 'GAF Timberline HDZ',
                estimatedValueMin: 22000,
                estimatedValueMax: 26000,
                estimateAvailable: true,
                measurementsAvailable: true,
                claimFiledDate: '2026-03-13',
                distance: 18
            },
            {
                id: 'CS-2026-0045',
                location: 'Zionsville',
                zip: '46077',
                damageType: 'Roof + Gutters',
                damageDetail: 'Hail',
                insuranceCarrier: 'Liberty Mutual',
                material: 'CertainTeed Landmark',
                estimatedValueMin: 19000,
                estimatedValueMax: 23000,
                estimateAvailable: true,
                measurementsAvailable: true,
                claimFiledDate: '2026-03-12',
                distance: 22
            },
            {
                id: 'CS-2026-0044',
                location: 'Fishers',
                zip: '46038',
                damageType: 'Roof',
                damageDetail: 'Hail',
                insuranceCarrier: 'USAA',
                material: 'Metal Standing Seam',
                estimatedValueMin: 35000,
                estimatedValueMax: 42000,
                estimateAvailable: true,
                measurementsAvailable: false,
                claimFiledDate: '2026-03-10',
                distance: 28
            }
        ];

        function calculatePlatformFees(valueMin, valueMax) {
            const baseFeeMin = valueMin * 0.05;
            const baseFeeMax = valueMax * 0.05;

            return {
                baseFeeMin: baseFeeMin.toLocaleString('en-US', {style: 'currency', currency: 'USD', minimumFractionDigits: 0}),
                baseFeeMax: baseFeeMax.toLocaleString('en-US', {style: 'currency', currency: 'USD', minimumFractionDigits: 0}),
                totalMin: baseFeeMin.toLocaleString('en-US', {style: 'currency', currency: 'USD', minimumFractionDigits: 0}),
                totalMax: baseFeeMax.toLocaleString('en-US', {style: 'currency', currency: 'USD', minimumFractionDigits: 0})
            };
        }

        function formatCurrency(value) {
            return value.toLocaleString('en-US', {style: 'currency', currency: 'USD', minimumFractionDigits: 0});
        }

        function renderLeads(leads) {
            const container = document.getElementById('leadsContainer');

            if (leads.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <span class="empty-state-icon">📭</span>
                        <h2 class="empty-state-title">No projects found</h2>
                        <p class="empty-state-text">Try adjusting your filters to see more available projects.</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = leads.map(lead => {
                const fees = calculatePlatformFees(lead.estimatedValueMin, lead.estimatedValueMax);
                const estimatedValue = `${formatCurrency(lead.estimatedValueMin)} - ${formatCurrency(lead.estimatedValueMax)}`;

                return `
                    <div class="lead-card">
                        <div class="lead-header">
                            <div>
                                <h2 class="lead-id">${lead.id}</h2>
                                <p class="lead-location">${lead.location}, ${lead.zip}</p>
                            </div>
                        </div>

                        <div class="lead-main-info">
                            <div class="info-block">
                                <span class="info-label">Damage Type</span>
                                <span class="info-value">${lead.damageType} — ${lead.damageDetail}</span>
                            </div>
                            <div class="info-block">
                                <span class="info-label">Insurance Carrier</span>
                                <span class="info-value">${lead.insuranceCarrier}</span>
                            </div>
                            <div class="info-block">
                                <span class="info-label">Material Selected</span>
                                <span class="info-value">${lead.material}</span>
                            </div>
                            <div class="info-block">
                                <span class="info-label">Estimated Job Value</span>
                                <span class="info-value">${estimatedValue}</span>
                            </div>
                        </div>

                        <div class="badge-group">
                            ${lead.estimateAvailable ? '<span class="badge badge-available">Insurance Estimate ✓</span>' : ''}
                            ${lead.measurementsAvailable ? '<span class="badge badge-available">Measurements ✓</span>' : '<span class="badge badge-pending">Measurements Pending</span>'}
                        </div>

                        <div class="info-block" style="margin-bottom: var(--sp-6);">
                            <span class="info-label">Claim Filed</span>
                            <span class="info-value">${new Date(lead.claimFiledDate).toLocaleDateString('en-US', {year: 'numeric', month: 'short', day: 'numeric'})}</span>
                        </div>

                        <div class="fee-breakdown">
                            <span class="fee-breakdown-title">Platform Fee Breakdown</span>
                            <div class="fee-item">
                                <span class="fee-item-label">Contract Signing (5%)</span>
                                <span class="fee-item-amount">${fees.baseFeeMin} - ${fees.baseFeeMax}</span>
                            </div>
                            <div class="fee-item fee-total">
                                <span>Total Platform Fees</span>
                                <span>${fees.totalMin} - ${fees.totalMax}</span>
                            </div>
                        </div>

                        <div class="actions-row">
                            <button class="btn btn-secondary">Details</button>
                            <a href="contractor-bid-form.html?lead=${lead.id}" class="btn btn-primary">Submit Bid</a>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function filterAndSortLeads() {
            let filtered = [...demoLeads];

            // Apply filters
            const damageType = document.getElementById('damageTypeFilter').value;
            if (damageType) {
                filtered = filtered.filter(lead => lead.damageType.toLowerCase().includes(damageType));
            }

            const material = document.getElementById('materialFilter').value;
            if (material) {
                filtered = filtered.filter(lead => {
                    const materialLower = lead.material.toLowerCase();
                    if (material === 'architectural') return materialLower.includes('architectural');
                    if (material === 'designer') return materialLower.includes('designer');
                    if (material === 'metal-seam') return materialLower.includes('standing seam');
                    if (material === 'metal-fastener') return materialLower.includes('exposed fastener');
                    return true;
                });
            }

            const distance = document.getElementById('distanceFilter').value;
            if (distance) {
                const maxDistance = parseInt(distance);
                filtered = filtered.filter(lead => lead.distance <= maxDistance);
            }

            // Apply sorting
            const sortBy = document.getElementById('sortFilter').value;
            if (sortBy === 'value-high') {
                filtered.sort((a, b) => b.estimatedValueMax - a.estimatedValueMax);
            } else if (sortBy === 'closest') {
                filtered.sort((a, b) => a.distance - b.distance);
            }
            // 'newest' is default order

            // Update results count
            document.getElementById('resultsCount').textContent = `${filtered.length} project${filtered.length !== 1 ? 's' : ''} available`;

            // Render
            renderLeads(filtered);
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            if (CONFIG.DEMO_MODE) {
                filterAndSortLeads();

                // Add filter listeners
                document.getElementById('damageTypeFilter').addEventListener('change', filterAndSortLeads);
                document.getElementById('materialFilter').addEventListener('change', filterAndSortLeads);
                document.getElementById('distanceFilter').addEventListener('change', filterAndSortLeads);
                document.getElementById('sortFilter').addEventListener('change', filterAndSortLeads);
            }
        });
    </script>
</body>
</html>
