    <style>
        main { padding: var(--sp-8) var(--sp-4); max-width: 1400px; margin: 0 auto; }

        .sales-banner {
            background: linear-gradient(135deg, rgba(20,184,166,0.08), rgba(20,184,166,0.03));
            border: 1px solid rgba(20,184,166,0.2);
            border-radius: var(--radius-lg);
            padding: var(--sp-4) var(--sp-6);
            margin-bottom: var(--sp-8);
            display: flex;
            align-items: center;
            gap: var(--sp-3);
        }
        .sales-banner-icon { font-size: 1.5rem; }
        .sales-banner p { font-family: var(--font-body); font-size: 0.95rem; color: var(--navy); margin: 0; }
        .sales-banner strong { color: var(--amber); }

        .page-header { margin-bottom: var(--sp-8); }
        .page-header h1 { font-family: var(--font-heading); font-size: 2.5rem; font-weight: 700; color: var(--navy); margin-bottom: var(--sp-2); line-height: 1.1; }
        .page-header p { font-family: var(--font-body); font-size: 1.125rem; color: var(--slate); margin: 0; }

        .filter-section {
            background: var(--white); border: 1px solid #E5E7EB; border-radius: var(--radius-lg);
            padding: var(--sp-6); margin-bottom: var(--sp-8);
            display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: var(--sp-4);
        }
        .filter-group { display: flex; flex-direction: column; gap: var(--sp-2); }
        .filter-label { font-family: var(--font-body); font-size: 0.875rem; font-weight: 600; color: var(--navy); text-transform: uppercase; letter-spacing: 0.05em; }
        .filter-select { padding: var(--sp-3) var(--sp-4); border: 1px solid #D1D5DB; border-radius: var(--radius-md); font-family: var(--font-body); font-size: 0.95rem; color: var(--navy); background: var(--white); cursor: pointer; transition: border-color 0.2s ease; }
        .filter-select:hover, .filter-select:focus { border-color: var(--amber); outline: none; }

        .opportunity-card { background: var(--white); border: 1px solid #E5E7EB; border-radius: var(--radius-lg); padding: var(--sp-6); margin-bottom: var(--sp-6); transition: all 0.2s ease; position: relative; }
        .opportunity-card:hover { border-color: var(--amber); box-shadow: 0 8px 24px rgba(20,184,166,0.1); }
        .opportunity-card.urgent-card { border-left: 4px solid #EF4444; }

        .opportunity-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: var(--sp-4); gap: var(--sp-4); }
        .opportunity-id { font-family: var(--font-heading); font-size: 1.25rem; font-weight: 700; color: var(--navy); margin: 0; }
        .opportunity-location { font-family: var(--font-body); font-size: 0.95rem; color: var(--slate); margin: var(--sp-1) 0 0 0; }
        .header-badges { display: flex; gap: var(--sp-2); flex-wrap: wrap; align-items: center; }

        .opportunity-main-info { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: var(--sp-4); margin-bottom: var(--sp-6); padding-bottom: var(--sp-6); border-bottom: 1px solid #E5E7EB; }
        .info-block { display: flex; flex-direction: column; gap: var(--sp-1); }
        .info-label { font-family: var(--font-body); font-size: 0.75rem; font-weight: 600; color: var(--slate); text-transform: uppercase; letter-spacing: 0.05em; }
        .info-value { font-family: var(--font-body); font-size: 1rem; font-weight: 500; color: var(--navy); }

        .badge-group { display: flex; flex-wrap: wrap; gap: var(--sp-3); margin-bottom: var(--sp-6); }
        .badge { display: inline-block; padding: var(--sp-2) var(--sp-4); background: #F3F4F6; color: var(--navy); border-radius: var(--radius-md); font-family: var(--font-body); font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em; }
        .badge-available { background: #DCFCE7; color: #15803D; }
        .badge-pending { background: #FEF3C7; color: #92400E; }
        .badge-rcv { background: #DBEAFE; color: #1D4ED8; }
        .badge-acv { background: #E9D5FF; color: #7C3AED; }
        .badge-retail { background: #D1FAE5; color: #065F46; }
        .badge-repair { background: #FED7AA; color: #9A3412; }
        .badge-urgent { background: #FEE2E2; color: #DC2626; animation: pulse-urgent 2s ease-in-out infinite; }
        @keyframes pulse-urgent { 0%,100%{opacity:1} 50%{opacity:0.7} }

        .homeowner-notes { background: #F0F9FF; border: 1px solid #BAE6FD; border-radius: var(--radius-md); padding: var(--sp-3) var(--sp-4); margin-bottom: var(--sp-6); font-family: var(--font-body); font-size: 0.9rem; color: #0C4A6E; }
        .homeowner-notes strong { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: var(--sp-1); color: #0369A1; }

        .fee-breakdown { background: #F9FAFB; border: 1px solid #E5E7EB; border-radius: var(--radius-md); padding: var(--sp-4); margin-bottom: var(--sp-6); }
        .fee-breakdown-title { font-family: var(--font-body); font-size: 0.875rem; font-weight: 700; color: var(--navy); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: var(--sp-3); display: block; }
        .fee-item { display: flex; justify-content: space-between; align-items: center; padding: var(--sp-2) 0; font-family: var(--font-body); font-size: 0.9rem; color: #374151; }
        .fee-item-label { font-weight: 500; }
        .fee-item-amount { color: var(--navy); font-weight: 600; }
        .fee-total { padding-top: var(--sp-3); border-top: 2px solid #D1D5DB; font-weight: 700; color: var(--navy); }

        .actions-row { display: flex; gap: var(--sp-4); justify-content: flex-end; }
        .btn { display: inline-block; padding: var(--sp-3) var(--sp-6); border: none; border-radius: var(--radius-md); font-family: var(--font-body); font-size: 0.95rem; font-weight: 600; text-decoration: none; cursor: pointer; transition: all 0.2s ease; }
        .btn-primary { background: var(--amber); color: var(--white); }
        .btn-primary:hover { background: #D97706; }
        .btn-secondary { background: #F3F4F6; color: var(--navy); border: 1px solid #D1D5DB; }
        .btn-secondary:hover { background: #E5E7EB; }

        .empty-state { text-align: center; padding: var(--sp-12); color: var(--slate); }
        .empty-state-icon { font-size: 3rem; margin-bottom: var(--sp-4); display: block; }
        .empty-state-title { font-family: var(--font-heading); font-size: 1.5rem; font-weight: 700; color: var(--navy); margin-bottom: var(--sp-2); }
        .empty-state-text { font-family: var(--font-body); font-size: 1rem; color: var(--slate); margin-bottom: var(--sp-6); }
        .results-count { font-family: var(--font-body); font-size: 0.95rem; color: var(--slate); margin-bottom: var(--sp-6); }

        @media (max-width: 768px) {
            main { padding: var(--sp-4) var(--sp-3); }
            .page-header h1 { font-size: 1.75rem; }
            .filter-section { grid-template-columns: 1fr; }
            .opportunity-header { flex-direction: column; align-items: flex-start; }
            .opportunity-main-info { grid-template-columns: 1fr; }
            .actions-row { flex-direction: column; }
            .btn { width: 100%; text-align: center; }
            .sales-banner { flex-direction: column; text-align: center; }
        }

</head>
<body>
    <header id="site-header" data-auth="false"></header>

    <main>
        <div class="sales-banner">
            <span class="sales-banner-icon">&#x1F4BC;</span>
            <p><strong>Fully executed, ready-to-install contracts.</strong> Not leads &mdash; we're your sales team that doesn't need a truck, a manager, or an advance.</p>

            <h1>Available Opportunities</h1>

        </div>

        <div class="filter-section">
            <div class="filter-group">
                <label class="filter-label">Job Type</label>
                <select class="filter-select" id="jobTypeFilter">

                    <option value="insurance_rcv">Insurance (RCV)</option>

    <script>
        // State
        let currentUser = null;
        let allOpportunities = [];
        let currentContractor = null;

        // Initialize
        async function init() {
          currentUser = await Auth.requireAuth('contractor');
          if (!currentUser && !CONFIG.DEMO_MODE) {
            // Already redirected
            return;
          }

          // Load contractor profile for filtering by service area
          if (currentUser && !CONFIG.DEMO_MODE && sb) {
            try {
              const { data } = await sb
                .from('contractors')
                .select('*')
                .eq('user_id', currentUser.id)
                .single();

              if (data) currentContractor = data;
            } catch (err) {
              console.error('Error loading contractor:', err);
            }
          }

          // Load opportunities
          if (CONFIG.DEMO_MODE) {
            allOpportunities = demoOpportunities;
          } else if (sb) {
            try {
              // Query claims that are ready for bids (status = 'active' or 'bidding')
              // Also include 'pending' for claims that are freshly submitted
              const { data, error } = await sb
                .from('claims')
                .select('*')
                .eq('ready_for_bids', true)
                .in('status', ['active', 'bidding', 'pending'])
                .order('created_at', { ascending: false })
                .limit(50);

              if (!error && data) {
                allOpportunities = data.map(claim => {
                  // Parse city and zip from property_address
                  const addressParts = (claim.property_address || '').split(',');
                  const city = claim.address_city || addressParts[0]?.trim() || 'Unknown';
                  const zip = claim.address_zip || claim.property_address?.match(/\d{5}/)?.[0] || '';

                  // Parse trades from claim
                  const trades = claim.selected_trades || claim.trades || ['roofing'];

                  return {
                    id: claim.id,
                    propertyAddress: claim.property_address || null,
                    location: city,
                    zip: zip,
                    state: claim.address_state || 'IN',
                    jobType: claim.job_type || 'insurance_rcv',
                    trades: Array.isArray(trades) ? trades : [trades],
                    damageType: claim.damage_type || 'Unknown',
                    damageDetail: claim.damage_description || '',
                    insuranceCarrier: claim.insurance_carrier || 'Unknown',
                    material: claim.material_product || null,
                    estimatedValue: claim.rcv_amount || null,
                    acvPayout: claim.acv_amount || null,
                    deductible: claim.deductible_amount || null,
                    roofSquares: claim.roof_squares || null,
                    repairSquares: claim.repair_squares || null,
                    totalSquares: null,
                    existingShingle: claim.existing_shingle_brand ? `${claim.existing_shingle_brand} - ${claim.existing_shingle_color}` : null,
                    estimateAvailable: !!(claim.estimate_filename || claim.has_estimate),
                    measurementsAvailable: !!(claim.measurements_filename || claim.has_measurements),
                    claimFiledDate: claim.created_at,
                    distance: 0, // TODO: Calculate from contractor address to claim address
                    urgency: claim.urgency || 'flexible',
                    urgencyDeadline: claim.urgency_deadline,
                    urgencyReason: claim.urgency_reason,
                    homeownerNotes: claim.homeowner_notes,
                    fundingType: claim.funding_type || (claim.job_type?.startsWith('insurance') ? 'insurance' : 'cash'),
                  };
                });

                // Filter by contractor's trades if we have a contractor profile
                if (currentContractor && currentContractor.trades && currentContractor.trades.length > 0) {
                  const contractorTrades = currentContractor.trades.map(t => t.toLowerCase());
                  allOpportunities = allOpportunities.filter(opp => {
                    // Show opportunity if ANY of the contractor's trades match ANY of the claim's trades
                    return opp.trades.some(t => contractorTrades.includes(t.toLowerCase()));
                  });
                }

                // Check how many bids already exist per opportunity and exclude those at max (6)
                if (allOpportunities.length > 0) {
                  const claimIds = allOpportunities.map(o => o.id);
                  const { data: bidCounts } = await sb
                    .from('quotes')
                    .select('claim_id')
                    .in('claim_id', claimIds);

                  if (bidCounts) {
                    const countMap = {};
                    bidCounts.forEach(q => {
                      countMap[q.claim_id] = (countMap[q.claim_id] || 0) + 1;
                    });
                    // Exclude opportunities that already have 6 bids (D-030)
                    allOpportunities = allOpportunities.filter(o => (countMap[o.id] || 0) < 6);
                  }
                }

                // Also exclude opportunities this contractor has already bid on
                if (currentContractor) {
                  const { data: myBids } = await sb
                    .from('quotes')
                    .select('claim_id')
                    .eq('contractor_id', currentContractor.id);

                  if (myBids && myBids.length > 0) {
                    const myBidClaimIds = new Set(myBids.map(b => b.claim_id));
                    allOpportunities = allOpportunities.filter(o => !myBidClaimIds.has(o.id));
                  }
                }
              }
            } catch (err) {
              console.error('Error loading opportunities:', err);
              // Don't fall back to demo data in production — show empty state
              allOpportunities = [];
            }
          }

          applyFilters();
        }

        const demoOpportunities = [
            {
                id: 'OQ-2026-0048', location: 'Indianapolis', zip: '46220', jobType: 'insurance_rcv',
                trades: ['roofing'], damageType: 'Roof', damageDetail: 'Hail & Wind', insuranceCarrier: 'State Farm',
                material: 'GAF Architectural — Class 4 Impact Resistant', estimatedValue: 22000,
                roofSquares: null, repairSquares: null, totalSquares: null, existingShingle: null,
                estimateAvailable: true, measurementsAvailable: true, claimFiledDate: '2026-03-15',
                distance: 5, urgency: 'flexible', urgencyDeadline: null, urgencyReason: null,
                homeownerNotes: null, fundingType: 'insurance'
            },
            {
                id: 'OQ-2026-0047', location: 'Carmel', zip: '46032', jobType: 'insurance_acv',
                trades: ['roofing'], damageType: 'Roof', damageDetail: 'Wind', insuranceCarrier: 'Allstate',
                material: 'OC Duration', estimatedValue: 17000, acvPayout: 11200, deductible: 2500,
                roofSquares: null, repairSquares: null, totalSquares: null, existingShingle: null,
                estimateAvailable: true, measurementsAvailable: false, claimFiledDate: '2026-03-14',
                distance: 18, urgency: 'flexible', urgencyDeadline: null, urgencyReason: null,
                homeownerNotes: 'Two-story home. Ladder access on south side only.', fundingType: 'insurance'
            },
            {
                id: 'OQ-2026-0046', location: 'Fishers', zip: '46037', jobType: 'retail',
                trades: ['roofing'], damageType: 'Roof', damageDetail: 'Age / Wear', insuranceCarrier: null,
                material: 'GAF Timberline HDZ', estimatedValue: null,
                roofSquares: 28, repairSquares: null, totalSquares: null, existingShingle: null,
                estimateAvailable: false, measurementsAvailable: true, claimFiledDate: '2026-03-13',
                distance: 22, urgency: 'flexible', urgencyDeadline: null, urgencyReason: null,
                homeownerNotes: null, fundingType: 'cash'
            },
            {
                id: 'OQ-2026-0045', location: 'Noblesville', zip: '46060', jobType: 'repair',
                trades: ['roofing'], damageType: 'Roof', damageDetail: 'Wind — Partial', insuranceCarrier: 'Erie Insurance',
                material: null, existingShingle: 'GAF Timberline HD — Charcoal',
                estimatedValue: null, roofSquares: null, repairSquares: 1.5, totalSquares: 25,
                estimateAvailable: true, measurementsAvailable: false, claimFiledDate: '2026-03-12',
                distance: 25, urgency: 'flexible', urgencyDeadline: null, urgencyReason: null,
                homeownerNotes: 'Damage on north-facing slope near chimney. Have leftover shingles in garage — confirmed GAF Timberline HD Charcoal.',
                fundingType: 'insurance', repairType: 'blown_off'
            },
            {
                id: 'OQ-2026-0044', location: 'Greenwood', zip: '46142', jobType: 'insurance_rcv',
                trades: ['roofing', 'gutters'], damageType: 'Roof + Gutters', damageDetail: 'Hail', insuranceCarrier: 'Liberty Mutual',
                material: 'CertainTeed Landmark', estimatedValue: 26000,
                roofSquares: null, repairSquares: null, totalSquares: null, existingShingle: null,
                estimateAvailable: true, measurementsAvailable: true, claimFiledDate: '2026-03-10',
                distance: 15, urgency: 'asap', urgencyDeadline: '2026-04-15',
                urgencyReason: 'Real estate closing April 15',
                homeownerNotes: 'House is under contract. Must have roof complete before closing on April 15. Buyer inspection passed contingent on roof.',
                fundingType: 'insurance'
            },
            {
                id: 'OQ-2026-0043', location: 'Zionsville', zip: '46077', jobType: 'insurance_rcv',
                trades: ['roofing', 'siding', 'gutters'], damageType: 'Roof + Siding + Gutters', damageDetail: 'Hail & Wind', insuranceCarrier: 'State Farm',
                material: 'OC Duration STORM — Class 4', estimatedValue: 38000,
                roofSquares: null, repairSquares: null, totalSquares: null, existingShingle: null,
                estimateAvailable: true, measurementsAvailable: true, claimFiledDate: '2026-03-08',
                distance: 8, urgency: 'flexible', urgencyDeadline: null, urgencyReason: null,
                homeownerNotes: 'Full exterior claim. Siding on north and west sides only. Gutters all around.',
                fundingType: 'insurance'
            }
        ];

        function getJobTypeBadge(jobType) {
            const map = {
                insurance_rcv: '<span class="badge badge-rcv">Insurance (RCV)</span>',
                insurance_acv: '<span class="badge badge-acv">Insurance (ACV)</span>',
                retail: '<span class="badge badge-retail">Retail</span>',
                repair: '<span class="badge badge-repair">Repair</span>'
            };
            return map[jobType] || '';
        }

        function getTradeBadges(trades) {
            if (!trades || !trades.length) return '';
            const icons = { roofing: '🏠', siding: '🧱', gutters: '🌧️', windows: '🪟' };
            const labels = { roofing: 'Roofing', siding: 'Siding', gutters: 'Gutters', windows: 'Windows' };
            return trades.map(t => '<span class="badge" style="background:#E0F2FE;color:#0369A1;">' + (icons[t]||'') + ' ' + (labels[t]||t) + '</span>').join('');
        }

        function getMultiTradeBadge(trades) {
            if (!trades || trades.length <= 1) return '';
            return '<span class="badge" style="background:#FEF3C7;color:#92400E;font-weight:700;">📦 MULTI-TRADE (' + trades.length + ')</span>';
        }

        function getUrgentBadge(opp) {
            if (opp.urgency !== 'asap') return '';
            const dl = opp.urgencyDeadline ? new Date(opp.urgencyDeadline).toLocaleDateString('en-US',{month:'short',day:'numeric'}) : '';
            return '<span class="badge badge-urgent">URGENT' + (dl ? ' — ' + dl : '') + '</span>';
        }

        function getValueDisplay(opp) {
            if (opp.jobType === 'retail') return { label: 'Roof Size', value: opp.roofSquares ? opp.roofSquares + ' squares' : 'Pending measurement' };
            if (opp.jobType === 'repair') return { label: 'Repair Scope', value: (opp.repairSquares && opp.totalSquares) ? opp.repairSquares + ' sq of ' + opp.totalSquares + ' sq total' : 'See estimate' };
            return { label: 'Est. Value', value: opp.estimatedValue ? fmt(opp.estimatedValue) : 'See estimate' };
        }

        function calcFees(opp) {
            let base = opp.estimatedValue || (opp.roofSquares ? opp.roofSquares * 700 : null);
            if (!base) return null;
            return { baseFee: fmt(base*0.05), colorFee: fmt(base*0.03), deductibleFee: fmt(base*0.05), total: fmt(base*0.13) };
        }

        function fmt(v) { return v.toLocaleString('en-US',{style:'currency',currency:'USD',minimumFractionDigits:0}); }

        function render(opps) {
            const el = document.getElementById('opportunitiesContainer');
            if (!opps.length) {
                el.innerHTML = '<div class="empty-state"><span class="empty-state-icon">&#x1F4ED;</span><h2 class="empty-state-title">No opportunities found</h2><p class="empty-state-text">Try adjusting your filters to see more available projects.</p></div>';
                return;
            }
            el.innerHTML = opps.map(o => {
                const fees = calcFees(o);
                const vd = getValueDisplay(o);
                const isUrgent = o.urgency === 'asap';

                let sourceBlock = o.jobType === 'retail'
                    ? '<div class="info-block"><span class="info-label">Job Type</span><span class="info-value">Retail / Cash</span></div>'
                    : '<div class="info-block"><span class="info-label">Insurance Carrier</span><span class="info-value">' + (o.insuranceCarrier||'N/A') + '</span></div>';

                let matBlock = '';
                if (o.jobType === 'repair' && o.existingShingle)
                    matBlock = '<div class="info-block"><span class="info-label">Existing Shingle (must match)</span><span class="info-value">' + o.existingShingle + '</span></div>';
                else if (o.material)
                    matBlock = '<div class="info-block"><span class="info-label">Material Selected</span><span class="info-value">' + o.material + '</span></div>';

                let notes = '';
                if (o.homeownerNotes) {
                    const t = o.homeownerNotes.length > 150 ? o.homeownerNotes.substring(0,150)+'...' : o.homeownerNotes;
                    notes = '<div class="homeowner-notes"><strong>Homeowner Notes</strong>' + t + '</div>';
                }

                let feeHtml = '';
                if (fees) {
                    feeHtml = '<div class="fee-breakdown"><span class="fee-breakdown-title">Estimated Platform Fees</span>'
                        + '<div class="fee-item"><span class="fee-item-label">Contract Signing (5%)</span><span class="fee-item-amount">' + fees.baseFee + '</span></div>'
                        + '<div class="fee-item"><span class="fee-item-label">Color Selection Service (3%)</span><span class="fee-item-amount">' + fees.colorFee + '</span></div>'
                        + '<div class="fee-item"><span class="fee-item-label">Deductible Collection (5%)</span><span class="fee-item-amount">' + fees.deductibleFee + '</span></div>'
                        + '<div class="fee-item fee-total"><span>Total Platform Fees</span><span>' + fees.total + '</span></div></div>';
                }

                return '<div class="opportunity-card' + (isUrgent?' urgent-card':'') + '">'
                    + '<div class="opportunity-header"><div>'
                    + '<h2 class="opportunity-id">' + (o.propertyAddress || 'Project #' + String(o.id).substring(0,8)) + '</h2>'
                    + '<p class="opportunity-location">' + o.location + ', ' + o.zip + ' &mdash; ' + o.distance + ' mi away</p>'
                    + '</div><div class="header-badges">' + getJobTypeBadge(o.jobType) + getMultiTradeBadge(o.trades) + getUrgentBadge(o) + '</div></div>'
                    + '<div class="badge-group" style="margin-bottom:var(--sp-4)">' + getTradeBadges(o.trades) + '</div>'
                    + '<div class="opportunity-main-info">'
                    + '<div class="info-block"><span class="info-label">Damage Type</span><span class="info-value">' + o.damageType + ' &mdash; ' + o.damageDetail + '</span></div>'
                    + sourceBlock + matBlock
                    + '<div class="info-block"><span class="info-label">' + vd.label + '</span><span class="info-value">' + vd.value + '</span></div>'
                    + '</div>'
                    + '<div class="badge-group">'
                    + (o.estimateAvailable ? '<span class="badge badge-available">Insurance Estimate &#x2713;</span>' : '')
                    + (o.measurementsAvailable ? '<span class="badge badge-available">Measurements &#x2713;</span>' : '<span class="badge badge-pending">Measurements Pending</span>')
                    + '</div>'
                    + notes
                    + '<div class="info-block" style="margin-bottom:var(--sp-6)"><span class="info-label">Submitted</span><span class="info-value">' + new Date(o.claimFiledDate).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'}) + '</span></div>'
                    + feeHtml
                    + '<div class="actions-row"><button class="btn btn-secondary">Details</button><a href="contractor-bid-form.html?project=' + o.id + '" class="btn btn-primary">Submit Bid</a></div>'
                    + '</div>';
            }).join('');
        }

        function applyFilters() {
            let f = [...allOpportunities];
            const jt = document.getElementById('jobTypeFilter').value;
            if (jt) f = f.filter(o => o.jobType === jt);
            const tr = document.getElementById('tradeFilter').value;
            if (tr === 'multi') f = f.filter(o => o.trades && o.trades.length > 1);
            else if (tr) f = f.filter(o => o.trades && o.trades.includes(tr));
            const mt = document.getElementById('materialFilter').value;
            if (mt) f = f.filter(o => { const m=(o.material||'').toLowerCase(); if(mt==='architectural')return m.includes('architectural'); if(mt==='designer')return m.includes('designer'); if(mt==='metal-seam')return m.includes('standing seam'); if(mt==='metal-fastener')return m.includes('exposed fastener'); return true; });
            const dist = document.getElementById('distanceFilter').value;
            if (dist) f = f.filter(o => o.distance <= parseInt(dist));
            const sort = document.getElementById('sortFilter').value;
            if (sort==='value-high') f.sort((a,b)=>(b.estimatedValue||0)-(a.estimatedValue||0));
            else if (sort==='closest') f.sort((a,b)=>a.distance-b.distance);
            else if (sort==='urgent-first') f.sort((a,b)=>{ if(a.urgency==='asap'&&b.urgency!=='asap')return -1; if(b.urgency==='asap'&&a.urgency!=='asap')return 1; return 0; });
            document.getElementById('resultsCount').textContent = f.length + ' opportunit' + (f.length!==1?'ies':'y') + ' available';
            render(f);
        }

        document.addEventListener('DOMContentLoaded', () => {
            init().then(() => {
              ['jobTypeFilter','tradeFilter','materialFilter','distanceFilter','sortFilter'].forEach(id => {
                  document.getElementById(id).addEventListener('change', applyFilters);
              });
            });
        });
    </script>
</body>
</html>
