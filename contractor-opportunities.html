        /** Look up [lat, lng] for a zip, or null if not in table. */
        function getZipLatLng(zip) {
          if (!zip) return null;
          return ZIP_CENTROIDS[String(zip).trim().slice(0, 5)] || null;
        }

        /** Haversine formula — returns distance in miles between two lat/lng points. */
        function haversineMiles(lat1, lng1, lat2, lng2) {
          const R = 3958.8; // Earth radius in miles
          const dLat = (lat2 - lat1) * Math.PI / 180;
          const dLng = (lng2 - lng1) * Math.PI / 180;
          const a = Math.sin(dLat / 2) ** 2
            + Math.cos(lat1 * Math.PI / 180)
            * Math.cos(lat2 * Math.PI / 180)
            * Math.sin(dLng / 2) ** 2;
          return R * 2 * Math.asin(Math.sqrt(a));
        }

        /**
         * Compute distance in miles between two zip codes using centroid lookup.
         * Returns null if either zip is unknown (caller should treat as "distance
         * unknown" rather than 0, so filters/sorts still work sensibly).
         */
        function computeZipDistance(contractorZip, claimZip) {
          const c1 = getZipLatLng(contractorZip);
          const c2 = getZipLatLng(claimZip);
          if (!c1 || !c2) return null;
          return Math.round(haversineMiles(c1[0], c1[1], c2[0], c2[1]));
        }

                // Show an opportunity only if at least one of the contractor's service
                // trades matches a RELEASED trade on the claim. A trade is "released"
                // when its *_bid_released_at timestamp is non-null (set by the bidding
                // transition in dashboard.html or, for retail siding, by the
                // check-siding-design-completion gate). Unknown trades (outside the
                // known set) default to "released" as a conservative fallback.
                if (currentContractor && currentContractor.trades && currentContractor.trades.length > 0) {
                  const contractorTrades = currentContractor.trades.map(t => t.toLowerCase());
                  const knownTrades = ['roofing', 'gutters', 'siding', 'windows'];
                  allOpportunities = allOpportunities.filter(opp => {
                    return opp.trades.some(t => {
                      const tl = t.toLowerCase();
                      if (!contractorTrades.includes(tl)) return false; // not contractor's trade
                      if (!knownTrades.includes(tl)) return true;       // unknown trade = conservative include
                      // Only show if this trade's bid has been released
                      return !!(opp.releasedTrades && opp.releasedTrades[tl]);
                    });
                  });
                }

                // Check how many bids already exist per opportunity and exclude those at max (6)
                if (allOpportunities.length > 0) {
                  const claimIds = allOpportunities.map(o => o.id);
                  const { data: bidCounts } = await sb
                    .from('quotes')
                    .select('claim_id')
                    .in('claim_id', claimIds);

                  if (bidCounts) {
                    const countMap = {};
                    bidCounts.forEach(q => {
                      countMap[q.claim_id] = (countMap[q.claim_id] || 0) + 1;
                    });
                    // Exclude opportunities that already have 6 bids (D-030)
                    allOpportunities = allOpportunities.filter(o => (countMap[o.id] || 0) < 6);
                  }
                }

                // Also exclude opportunities this contractor has already bid on
                // D-150: keep opportunities where prior bid is expired — show rebid indicator instead
                if (currentContractor) {
                  const { data: myBids } = await sb
                    .from('quotes')
                    .select('id, claim_id, bid_status')
                    .eq('contractor_id', currentContractor.id);

                  if (myBids && myBids.length > 0) {
                    // Build map: claim_id → {quoteId, bidStatus}
                    const myBidMap = {};
                    myBids.forEach(b => { myBidMap[b.claim_id] = { quoteId: b.id, bidStatus: b.bid_status }; });

                    // Only fully exclude non-expired active bids
                    allOpportunities = allOpportunities.filter(o => {
                      const bid = myBidMap[o.id];
                      if (!bid) return true; // no bid — show normally
                      if (bid.bidStatus === 'expired') return true; // expired — keep, flag below
                      return false; // active bid — exclude
                    });

                    // Attach expired bid metadata to opportunities for rebid indicator (D-150)
                    allOpportunities.forEach(o => {
                      const bid = myBidMap[o.id];
                      if (bid && bid.bidStatus === 'expired') {
                        o.hasExpiredBid = true;
                        o.expiredQuoteId = bid.quoteId;
                      }
                    });
                  }
                }
              }
            } catch (err) {
              console.error('Error loading opportunities:', err);
              // Don't fall back to demo data in production — show empty state
              allOpportunities = [];
            }

        /**
         * D-165: Per-trade release status badges.
         * Shows a status badge for each trade indicating whether bids are open
         * or held pending a homeowner action (e.g. retail siding design in Hover).
         * Only renders when the opportunity has any unreleased trade OR multiple trades.
         */
        function getTradeReleaseBadges(opp) {
            if (!opp.trades || opp.trades.length === 0) return '';
            const knownTrades = ['roofing', 'gutters', 'siding', 'windows'];
            const labels = { roofing: 'Roofing', siding: 'Siding', gutters: 'Gutters', windows: 'Windows' };
            const releasedTrades = opp.releasedTrades || {};

            // Only show per-trade badges when there's something meaningful to communicate:
            // multi-trade claims, or a single-trade retail claim where the release is pending.
            const hasAnyUnreleased = opp.trades.some(t => {
                const tl = t.toLowerCase();
                return knownTrades.includes(tl) && !releasedTrades[tl];
            });
            if (!hasAnyUnreleased && opp.trades.length < 2) return '';

            return '<div class="badge-group" style="margin-top:4px;flex-wrap:wrap;gap:4px;">'
                + opp.trades.map(t => {
                    const tl = t.toLowerCase();
                    const label = labels[tl] || t;
                    const released = !knownTrades.includes(tl) ? true : !!releasedTrades[tl];
                    if (released) {
                        return '<span class="badge badge-available" style="font-size:0.72rem;">'
                            + label + ': Available &#x2713;</span>';
                    } else {
                        return '<span class="badge" style="background:#FEF3C7;color:#92400E;font-size:0.72rem;">'
                            + '&#x23F3; ' + label + ': Waiting on homeowner design</span>';
                    }
                }).join('')

        // ── Bid Expiry Countdown (86e10t2bh / D-150) ──────────────────────────
        function getExpiryCountdownHtml(opp) {
            if (!opp.bidWindowExpiresAt) return '';
            const now    = new Date();
            const expiry = new Date(opp.bidWindowExpiresAt);
            const diffMs = expiry - now;
            if (diffMs <= 0) return '<span class="expiry-badge expiry-red">&#x23F0; Bid window closed</span>';
            const diffDays = Math.ceil(diffMs / (1000 * 60 * 60 * 24));
            if (diffDays <= 1) return '<span class="expiry-badge expiry-red">&#x23F0; Closes today</span>';
            if (diffDays <= 3) return '<span class="expiry-badge expiry-amber">&#x23F0; Closes in ' + diffDays + ' days</span>';
            return '<span class="expiry-badge expiry-neutral">&#x23F0; Closes in ' + diffDays + ' days</span>';
        }

        // ── Document Links (86e10t26y) ─────────────────────────────────────────
        function getDocLinksHtml(opp) {
            // Populate oppDocMap so async click handlers can access filenames without inline escaping
            oppDocMap[opp.id] = { estimateFilename: opp.estimateFilename || null, measurementsAvailable: !!opp.measurementsAvailable };
            const parts = [];
            if (opp.estimateFilename) {
                parts.push('<button class="doc-link-btn" id="loss-' + opp.id + '" onclick="openEstimatePdf(' + JSON.stringify(String(opp.id)) + ')">&#x1F4C4; Loss Sheet</button>');
            }
            if (opp.measurementsAvailable) {
                parts.push('<button class="doc-link-btn" id="hover-' + opp.id + '" onclick="openHoverPdf(' + JSON.stringify(String(opp.id)) + ')">&#x1F4CF; Hover PDF</button>');
            }
            if (!parts.length) return '';
            return '<div class="docs-section"><span class="docs-label">Documents</span>' + parts.join('') + '</div>';
        }

        async function openEstimatePdf(claimId) {
            if (!sb) { alert('Not connected. Please refresh and try again.'); return; }
            const docInfo = oppDocMap[claimId];
            if (!docInfo?.estimateFilename) return;
            const btn = document.getElementById('loss-' + claimId);
            if (btn) { btn.disabled = true; btn.textContent = 'Loading\u2026'; }
            try {
                const { data, error } = await sb.storage
                    .from('claim-documents')
                    .createSignedUrl(docInfo.estimateFilename, 3600);
                if (error || !data?.signedUrl) throw error || new Error('No URL returned');
                window.open(data.signedUrl, '_blank');
            } catch (err) {
                console.error('Failed to open loss sheet:', err);
                alert('Unable to open the loss sheet. Please try again.');
            } finally {
                if (btn) { btn.disabled = false; btn.innerHTML = '&#x1F4C4; Loss Sheet'; }
            }
        }

        async function openHoverPdf(claimId) {
            if (!sb) { alert('Not connected. Please refresh and try again.'); return; }
            const btn = document.getElementById('hover-' + claimId);
            if (btn) { btn.disabled = true; btn.textContent = 'Loading\u2026'; }
            try {
                const { data, error } = await sb.functions.invoke('get-hover-pdf', {
                    body: { claim_id: claimId, format: 'url' }
                });
                if (error) throw error;
                if (!data?.url) throw new Error('No PDF URL returned');
                window.open(data.url, '_blank');
            } catch (err) {
                console.error('Failed to open Hover PDF:', err);
                alert('Hover measurement PDF is not available for this project yet. The measurement may still be in progress.');
            } finally {
                if (btn) { btn.disabled = false; btn.innerHTML = '&#x1F4CF; Hover PDF'; }
            }
        }

        // ── Scope Toggle ──
        function toggleScope(safeId) {
            const content = document.getElementById('scope-' + safeId);
            const arrow = document.getElementById('scope-arrow-' + safeId);
            if (!content) return;
            const isOpen = content.style.display !== 'none';
            content.style.display = isOpen ? 'none' : 'block';
            if (arrow) arrow.innerHTML = isOpen ? '&#x25BC;' : '&#x25B2;';
        }

        function escHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }
