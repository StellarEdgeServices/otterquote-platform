<!DOCTYPE html>
<html lang="en">
<head>
<!-- Sentry Error Monitoring -->
<script
  src="https://js.sentry-cdn.com/49b5839b50adc240398d822c46d4a86e.min.js"
  crossorigin="anonymous"
></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otter Quotes - Referral Router</title>
    <link rel="stylesheet" href="css/design-system.css">
    <style>
        body {
            background-color: var(--navy, #0D1B2E);
            color: var(--white, #FFFFFF);
            font-family: inherit;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .referral-container {
            text-align: center;
            padding: 2rem;
        }

        .logo {
            width: 80px;
            height: 80px;
            margin-bottom: 2rem;
            background-color: var(--amber, #E07B00);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: auto;
            margin-right: auto;
            font-weight: bold;
            font-size: 32px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(224, 123, 0, 0.2);
            border-top: 3px solid var(--amber, #E07B00);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 2rem auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .message {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 1rem;
        }

        .error-message {
            color: var(--white, #FFFFFF);
            margin-top: 2rem;
        }

        .error-message h2 {
            color: var(--amber, #E07B00);
            margin-bottom: 1rem;
        }

        .error-message a {
            color: var(--amber, #E07B00);
            text-decoration: none;
            font-weight: 500;
            transition: opacity 0.2s;
        }

        .error-message a:hover {
            opacity: 0.8;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="referral-container">
        <div id="loading-state">
            <div class="logo">OQ</div>
            <div class="spinner"></div>
            <p class="message">Setting up your referral...</p>
        </div>

        <div id="error-state" class="hidden error-message">
            <h2>Referral link not found</h2>
            <p>This referral code doesn't exist or has expired.</p>
            <p><a href="/">â Return to OtterQuote</a></p>
        </div>
    </div>

    <!-- Supabase UMD (must come before config.js) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="js/config.js"></script>

    <script>
        /**
         * ref.html â Referral Router & Click Tracker
         *
         * Flow:
         *  1. Read ?code= from URL
         *  2. Look up agent in referral_agents by unique_code
         *  3. Insert a 'clicked' record in the referrals table
         *  4. Store referral_agent_id + referral_id in sessionStorage so they
         *     can be attached to the homeowner's claim after registration
         *  5. Redirect to the appropriate co-branded landing page
         */
        async function handleReferral() {
            try {
                // 1. Get code from URL
                const params = new URLSearchParams(window.location.search);
                const code = params.get('code');

                if (!code) {
                    // No code â send to homepage
                    window.location.href = '/index.html';
                    return;
                }

                // 2. Make sure global Supabase client is ready
                if (!sb) {
                    console.error('Supabase client not initialized');
                    showError();
                    return;
                }

                // 3. Look up the agent by unique_code (public read policy allows this)
                const { data: agent, error: agentError } = await sb
                    .from('referral_agents')
                    .select('id, agent_type, first_name, last_name, company, photo_url, status')
                    .eq('unique_code', code)
                    .eq('status', 'active')
                    .single();

                if (agentError || !agent) {
                    console.error('Referral code not found:', agentError);
                    showError();
                    return;
                }

                // 4. Insert a 'clicked' referral record
                //    (public INSERT policy is in place via v16 migration)
                const { data: referralRow, error: insertError } = await sb
                    .from('referrals')
                    .insert({
                        referral_agent_id: agent.id,
                        status: 'clicked',
                        landing_page: window.location.href,
                        utm_source: params.get('utm_source') || null,
                        utm_medium: params.get('utm_medium') || null,
                        utm_campaign: params.get('utm_campaign') || null,
                    })
                    .select('id')
                    .single();

                if (insertError) {
                    // Non-fatal: click tracking failure shouldn't block the user
                    console.warn('Click tracking insert failed:', insertError);
                } else if (referralRow) {
                    // 5a. Store referral IDs so get-started.html can attach them
                    sessionStorage.setItem('oq_referral_agent_id', agent.id);
                    sessionStorage.setItem('oq_referral_id', referralRow.id);
                    sessionStorage.setItem('oq_referral_code', code);
                    // Also persist to localStorage so it survives magic-link redirect
                    localStorage.setItem('oq_referral_id', referralRow.id);
                }

                // 5b. Store agent display info for personalization on landing pages
                sessionStorage.setItem('oq_referral_agent', JSON.stringify({
                    name: `${agent.first_name} ${agent.last_name}`.trim(),
                    company: agent.company || '',
                    photo_url: agent.photo_url || '',
                    agent_type: agent.agent_type,
                }));

                // 6. Redirect to co-branded landing page
                let redirectUrl = '/ref-re.html';
                switch (agent.agent_type) {
                    case 're_agent':
                        redirectUrl = '/ref-re.html';
                        break;
                    case 'insurance_agent':
                        redirectUrl = '/ref-insurance.html';
                        break;
                    case 'home_inspector':
                        redirectUrl = '/ref-inspector.html';
                        break;
                    case 'customer':
                        redirectUrl = '/ref-re.html';
                        break;
                    default:
                        redirectUrl = '/ref-re.html';
                }

                window.location.href = `${redirectUrl}?code=${encodeURIComponent(code)}`;

            } catch (err) {
                console.error('Referral router error:', err);
                showError();
            }
        }

        function showError() {
            document.getElementById('loading-state').classList.add('hidden');
            document.getElementById('error-state').classList.remove('hidden');
        }

        // Run on load â sb is initialized by config.js above
        document.addEventListener('DOMContentLoaded', handleReferral);
    </script>
</body>
</html>
