# Netlify configuration — OtterQuote (D-182)
# Production deploys from: main branch
# Staging deploys from: staging branch

[build]
  publish = "."

# Staging context — deploys to staging--jade-alpaca-b82b5e.netlify.app
[context.staging]
  publish = "."

# Branch deploy previews (feature branches)
[context.deploy-preview]
  publish = "."

# Force UTF-8 charset on all HTML responses.
# Without this explicit header, some browsers fall back to Windows-1252 encoding
# which garbles UTF-8 multi-byte characters (em dashes render as "â??", etc.).
# This is the root-cause fix. HTML entities in source files are belt-and-suspenders.
[[headers]]
  for = "/*.html"
  [headers.values]
    Content-Type = "text/html; charset=UTF-8"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Admin auth gate — W4-P1 (May 1, 2026)
# Intercepts /admin-*.html before static HTML is served.
# Unauthenticated or non-admin sessions redirect to /login.html?reason=admin_required.
# Source: netlify/edge-functions/admin-auth-gate.ts
[[edge_functions]]
  path = "/admin-*.html"
  function = "admin-auth-gate"
