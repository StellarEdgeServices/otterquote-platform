name: Playwright E2E Tests

on:
  push:
    branches:
      - staging
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Run E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: 'tests/e2e/package.json'

      - name: Install E2E test dependencies
        working-directory: tests/e2e
        run: npm ci

      - name: Lint vanilla JS for syntax errors
        run: bash scripts/pre-push-check.sh

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('tests/e2e/package-lock.json') }}
          restore-keys: |
            playwright-chromium-${{ runner.os }}-

      - name: Install Playwright browsers
        working-directory: tests/e2e
        run: npx playwright install --with-deps chromium

      - name: Seed test database
        working-directory: tests/e2e
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BASE_URL: ${{ secrets.BASE_URL }}
        run: npm run seed

      - name: Wait for Netlify staging deploy
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
        run: |
          echo "Waiting for Netlify staging to serve latest commit (checking for cookie-storage.js in bid form)..."
          for i in $(seq 1 30); do
            CONTENT=$(curl -sf "${BASE_URL}/contractor-bid-form.html" | grep -c "cookie-storage.js" || echo "0")
            if [ "$CONTENT" -gt "0" ]; then
              echo "✅ Netlify deploy verified (iteration $i)"
              exit 0
            fi
            echo "  Iteration $i/30: old build still live, waiting 10s..."
            sleep 10
          done
          echo "❌ Netlify deploy not detected after 300s — tests may run against stale build"
          # Non-fatal: continue anyway so we get test output rather than a CI hang
          exit 0

      - name: Run Playwright tests
        working-directory: tests/e2e
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm test

      - name: Teardown test database
        if: always()
        working-directory: tests/e2e
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run teardown

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 30

      - name: Upload test videos on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-videos
          path: tests/e2e/test-results/
          retention-days: 7
